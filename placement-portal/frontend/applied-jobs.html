<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Applied Jobs - Placement Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body class="bg-gray-50">
  <script>window.USE_FIXTURES = false;</script>
  <div id="app" class="container mx-auto px-4 py-8 max-w-3xl"></div>

  <script type="module">
    import { renderNavbar } from '/js/ui.js';
    import { apiGet } from '/js/api.js';
    renderNavbar('body');

    const statusColors = {
      applied: 'bg-gray-50 text-gray-600 border-gray-200',
      shortlisted: 'bg-blue-50 text-blue-700 border-blue-200',
      rejected: 'bg-red-50 text-red-700 border-red-200',
      accepted: 'bg-green-50 text-green-700 border-green-200'
    };

    async function render() {
      const container = document.getElementById('app');
      container.innerHTML = '<div class="text-center text-gray-500 py-8">Loading application status...</div>';
      
      const apps = await apiGet('/jobs/applied');
      if (!Array.isArray(apps) || apps.length === 0) {
        container.innerHTML = `
          <h1 class="text-2xl font-bold text-gray-800 mb-6">Applied Jobs</h1>
          <div class="text-center text-gray-500 py-12 bg-white rounded-lg border border-dashed border-gray-200 p-6">
            <i class="fa-solid fa-file-signature text-4xl text-gray-300 mb-3"></i>
            <p class="font-medium text-gray-600">No applications found.</p>
            <a href="/jobs.html" class="mt-4 inline-block text-sm text-blue-600 font-semibold hover:underline">Browse job openings and apply</a>
          </div>
        `;
        return;
      }

      container.innerHTML = `
        <main>
          <h1 class="text-2xl font-bold text-gray-800 mb-6">Applied Jobs & Status</h1>
          <div class="space-y-6">
            ${apps.map(a => {
              const j = a.job || {};
              const c = a.company || {};
              const companyName = c.companyName || 'Unknown Company';
              
              return `
                <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-100">
                  <!-- Header: Position, Company, Badges -->
                  <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-5 pb-4 border-b border-gray-100">
                    <div>
                      <h3 class="font-bold text-gray-800 text-lg">${j.title || 'Unknown Position'}</h3>
                      <div class="text-sm text-gray-600 font-medium mt-1">
                        ${companyName} • ${j.location || 'N/A'} • <span class="text-green-600 font-semibold">${j.salary || 'N/A'}</span>
                      </div>
                    </div>
                    <div>
                      <span class="px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wide border ${statusColors[a.status] || statusColors.applied}">
                        ${a.status}
                      </span>
                    </div>
                  </div>
                  
                  <!-- Visual Progress Timeline -->
                  <div class="relative py-4 px-2">
                    <!-- Progress Line -->
                    <div class="absolute top-8 left-[15%] right-[15%] h-0.5 bg-gray-200 z-0"></div>
                    
                    <div class="flex justify-between items-center text-center">
                      
                      <!-- Step 1: Applied -->
                      <div class="flex flex-col items-center flex-1 z-10 relative">
                        <div class="w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm bg-white border-2 border-blue-600 text-blue-600 shadow-sm">
                          <i class="fa-solid fa-paper-plane text-xs"></i>
                        </div>
                        <span class="text-xs font-semibold text-gray-700 mt-2">Applied</span>
                        <span class="text-[10px] text-gray-400 mt-0.5">${new Date(a.appliedAt || a.createdAt).toLocaleDateString()}</span>
                      </div>

                      <!-- Step 2: Shortlisted -->
                      <div class="flex flex-col items-center flex-1 z-10 relative">
                        <div class="w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm bg-white border-2 ${a.status === 'shortlisted' || a.status === 'accepted' ? 'border-blue-600 text-blue-600' : 'border-gray-200 text-gray-300'} shadow-sm">
                          <i class="fa-solid fa-clipboard-check text-xs"></i>
                        </div>
                        <span class="text-xs font-semibold ${a.status === 'shortlisted' || a.status === 'accepted' ? 'text-gray-700 font-bold' : 'text-gray-400'} mt-2">Shortlisted</span>
                      </div>

                      <!-- Step 3: Decision -->
                      <div class="flex flex-col items-center flex-1 z-10 relative">
                        ${a.status === 'rejected' ? `
                          <div class="w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm bg-white border-2 border-red-500 text-red-500 shadow-sm">
                            <i class="fa-solid fa-circle-xmark text-xs"></i>
                          </div>
                          <span class="text-xs font-semibold text-red-500 mt-2 font-bold">Rejected</span>
                        ` : `
                          <div class="w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm bg-white border-2 ${a.status === 'accepted' ? 'border-green-500 text-green-500' : 'border-gray-200 text-gray-300'} shadow-sm">
                            <i class="fa-solid fa-circle-check text-xs"></i>
                          </div>
                          <span class="text-xs font-semibold ${a.status === 'accepted' ? 'text-green-600 font-bold' : 'text-gray-400'} mt-2">Accepted</span>
                        `}
                      </div>

                    </div>
                  </div>
                </div>
              `;
            }).join('')}
          </div>
        </main>
      `;
    }

    render();
  </script>
</body>
</html>
