<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin - Placement Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-gray-50">
  <script>
    window.USE_FIXTURES = true;
  </script>
  <script type="module">
    import { renderNavbar } from '/js/ui.js';
    import { apiGet } from '/js/api.js';
    renderNavbar('body');

    const container = document.createElement('main');
    container.className = 'container mx-auto px-4 py-8';
    container.innerHTML = `
      <h1 class="text-2xl font-semibold mb-4">Admin Dashboard</h1>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="bg-white p-4 rounded shadow">
          <h3 class="font-semibold">Companies</h3>
          <div id="companies"></div>
        </div>
        <div class="bg-white p-4 rounded shadow">
          <h3 class="font-semibold">Jobs</h3>
          <div id="jobs"></div>
        </div>
      </div>
    `;
    document.body.appendChild(container);

    async function renderAdmin() {
      const companies = await apiGet('/company');
      const jobs = await apiGet('/jobs');
      document.getElementById('companies').innerHTML = (companies || []).map(c => `<div class="py-2 border-b">${c.companyName}</div>`).join('');
      document.getElementById('jobs').innerHTML = (jobs || []).map(j => `<div class="py-2 border-b">${j.title}</div>`).join('');
    }

    renderAdmin();
  </script>
</body>
</html>
