<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login - Placement Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-gray-50 flex items-center justify-center h-screen">
  <div class="w-full max-w-md">
    <form id="loginForm" class="bg-white shadow rounded-lg p-6">
      <h2 class="text-xl font-semibold mb-4">Student Login</h2>
      <label class="block mb-2 text-sm">Email</label>
      <input id="email" type="email" required class="w-full border p-2 rounded mb-3" />
      <label class="block mb-2 text-sm">Password</label>
      <input id="password" type="password" required class="w-full border p-2 rounded mb-4" />
      <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded">Login</button>
      <p class="mt-4 text-sm text-gray-600">Don't have an account? <a href="/register.html" class="text-blue-600">Register</a></p>
    </form>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
