<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Profile - Placement Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-gray-50">
  <main class="container mx-auto px-4 py-8">
    <h1 class="text-2xl font-semibold mb-4">Your Profile</h1>
    <form id="profileForm" class="bg-white shadow rounded p-6 max-w-xl">
      <label class="block mb-2 text-sm">Name</label>
      <input id="name" class="w-full border p-2 rounded mb-3" />
      <label class="block mb-2 text-sm">Phone</label>
      <input id="phone" class="w-full border p-2 rounded mb-3" />
      <label class="block mb-2 text-sm">Branch</label>
      <input id="branch" class="w-full border p-2 rounded mb-3" />
      <label class="block mb-2 text-sm">CGPA</label>
      <input id="cgpa" type="number" step="0.01" class="w-full border p-2 rounded mb-3" />
      <label class="block mb-2 text-sm">Skills (comma separated)</label>
      <input id="skills" class="w-full border p-2 rounded mb-3" />
      <label class="block mb-2 text-sm">Resume (PDF)</label>
      <input id="resume" type="file" accept="application/pdf" class="mb-4" />
      <label class="block mb-2 text-sm">Profile Photo</label>
      <input id="photo" type="file" accept="image/*" class="mb-4" />
      <button id="saveBtn" class="bg-blue-600 text-white px-4 py-2 rounded">Save</button>
    </form>
  </main>

  <script>
    window.USE_FIXTURES = true;
  </script>
  <script type="module">
    import { renderNavbar, showToast } from '/js/ui.js';
    import { apiGet, apiPost } from '/js/api.js';
    renderNavbar('body');

    document.addEventListener('DOMContentLoaded', async () => {
      const profile = await apiGet('/student/profile');
      if (profile) {
        document.getElementById('name').value = profile.name || '';
        document.getElementById('phone').value = profile.phone || '';
        document.getElementById('branch').value = profile.branch || '';
        document.getElementById('cgpa').value = profile.cgpa || '';
        document.getElementById('skills').value = (profile.skills || []).join(',');
      }
    });

    document.getElementById('profileForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const payload = {
        name: document.getElementById('name').value,
        phone: document.getElementById('phone').value,
        branch: document.getElementById('branch').value,
        cgpa: document.getElementById('cgpa').value,
        skills: document.getElementById('skills').value.split(',').map(s => s.trim())
      };
      await apiPost('/student/profile', payload);

      const resumeEl = document.getElementById('resume');
      if (resumeEl.files.length) {
        const form = new FormData();
        form.append('resume', resumeEl.files[0]);
        await apiPost('/student/upload-resume', form, true);
      }

      const photoEl = document.getElementById('photo');
      if (photoEl.files.length) {
        const form = new FormData();
        form.append('photo', photoEl.files[0]);
        await apiPost('/student/upload-photo', form, true);
      }

      showToast('Profile updated');
    });
  </script>
</body>
</html>
