<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Profile - Placement Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-gray-50">
  <main class="container mx-auto px-4 py-8">
    <h1 class="text-2xl font-semibold mb-4">Your Profile</h1>
    <form id="profileForm" class="bg-white shadow rounded p-6 max-w-xl">
      <label class="block mb-2 text-sm">Name</label>
      <input id="name" class="w-full border p-2 rounded mb-3" />
      <label class="block mb-2 text-sm">Phone</label>
      <input id="phone" class="w-full border p-2 rounded mb-3" />
      <label class="block mb-2 text-sm">Branch</label>
      <input id="branch" class="w-full border p-2 rounded mb-3" />
      <label class="block mb-2 text-sm">CGPA</label>
      <input id="cgpa" type="number" step="0.01" class="w-full border p-2 rounded mb-3" />
      <label class="block mb-2 text-sm">Skills (comma separated)</label>
      <input id="skills" class="w-full border p-2 rounded mb-3" />
      <label class="block mb-2 text-sm">Resume (PDF)</label>
      <input id="resume" type="file" accept="application/pdf" class="mb-4" />
      <label class="block mb-2 text-sm">Profile Photo</label>
      <input id="photo" type="file" accept="image/*" class="mb-4" />
      <button id="saveBtn" class="bg-blue-600 text-white px-4 py-2 rounded">Save</button>
    </form>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/profile.js"></script>
</body>
</html>
