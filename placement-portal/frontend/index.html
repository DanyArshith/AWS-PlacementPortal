<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>College Placement Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body class="bg-gray-50 text-gray-900 font-sans">
  <script>
    window.USE_FIXTURES = false;
  </script>

  <main class="container mx-auto px-6 py-24 max-w-4xl text-center">
    <div class="space-y-8">
      <!-- Small Tag -->
      <span class="inline-block px-3.5 py-1 rounded-full bg-blue-50 text-blue-600 text-xs font-semibold tracking-wide uppercase">
        Placement Portal
      </span>
      
      <!-- Clean Typography Headline -->
      <h1 class="text-4xl sm:text-5xl font-extrabold tracking-tight text-gray-900 max-w-2xl mx-auto leading-tight">
        Connecting Talent with Opportunity
      </h1>
      
      <!-- Subtitle -->
      <p class="text-lg text-gray-500 max-w-xl mx-auto font-light leading-relaxed">
        A seamless gateway for students to showcase their credentials, upload resumes directly to S3, and track job applications in real-time.
      </p>
      
      <!-- Minimalist Call to Actions -->
      <div class="flex flex-col sm:flex-row justify-center items-center gap-4 pt-4">
        <a href="/jobs.html" class="w-full sm:w-auto bg-blue-600 hover:bg-blue-700 text-white font-semibold px-8 py-3.5 rounded-xl shadow-sm transition-all duration-300 hover:shadow flex items-center justify-center gap-2">
          Browse Jobs <i class="fa-solid fa-arrow-right text-xs"></i>
        </a>
        <a href="/register.html" class="w-full sm:w-auto bg-white hover:bg-gray-50 text-gray-700 border border-gray-200 font-semibold px-8 py-3.5 rounded-xl transition-colors duration-300 flex items-center justify-center gap-2">
          Create Account
        </a>
      </div>

      <!-- Accent Divider -->
      <div class="w-12 h-0.5 bg-gray-200 mx-auto my-12"></div>

      <!-- Minimal stats display -->
      <div class="grid grid-cols-3 gap-6 max-w-2xl mx-auto text-center">
        <div>
          <span class="block text-2xl font-bold text-gray-800">50+</span>
          <span class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Top Recruiters</span>
        </div>
        <div>
          <span class="block text-2xl font-bold text-gray-800">120+</span>
          <span class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Placed Students</span>
        </div>
        <div>
          <span class="block text-2xl font-bold text-gray-800">92%</span>
          <span class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Hiring Rate</span>
        </div>
      </div>
    </div>
  </main>

  <script type="module">
    import { renderNavbar } from '/js/ui.js';
    renderNavbar('body');
  </script>
</body>
</html>
