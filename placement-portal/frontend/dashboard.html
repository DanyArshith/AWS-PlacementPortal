<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dashboard - Placement Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-gray-50">
  <script>
    window.USE_FIXTURES = false;
  </script>
  <div id="app"></div>

  <script type="module">
    import { renderNavbar } from '/js/ui.js';
    import { apiGet } from '/js/api.js';
    renderNavbar('body');

    async function renderDashboard() {
      const profile = await apiGet('/student/profile');
      const apps = await apiGet('/jobs/applied');
      const container = document.getElementById('app');
      container.innerHTML = `
        <main class="container mx-auto px-4 py-8">
          <h1 class="text-2xl font-semibold mb-4">Dashboard</h1>
          <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="bg-white p-4 rounded shadow">
              <h3 class="font-semibold">Welcome, ${profile?.name || 'Student'}</h3>
              <p class="text-sm text-gray-600">Applied: ${Array.isArray(apps) ? apps.length : 0}</p>
            </div>
            <div class="md:col-span-2 bg-white p-4 rounded shadow">
              <h3 class="font-semibold mb-2">Recent Jobs</h3>
              <div id="recentJobs"></div>
            </div>
          </div>
        </main>
      `;

      const res = await apiGet('/jobs');
      const jobs = res.data || [];
      const recent = document.getElementById('recentJobs');
      recent.innerHTML = jobs.slice(0,5).map(j => `
        <div class="border-b py-2">
          <div class="flex justify-between">
            <div><strong>${j.title}</strong><div class="text-sm text-gray-600">${j.companyId || ''}</div></div>
            <div><a class="text-blue-600" href="/jobs.html">View</a></div>
          </div>
        </div>
      `).join('');
    }

    renderDashboard();
  </script>
</body>
</html>
