<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Jobs - Placement Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-gray-50">
  <header class="bg-white shadow">
    <div class="container mx-auto px-4 py-4 flex justify-between items-center">
      <h1 class="text-xl font-semibold">Jobs</h1>
      <nav>
        <a href="/login.html" class="text-blue-600">Login</a>
      </nav>
    </div>
  </header>

  <main class="container mx-auto px-4 py-8">
    <div class="mb-4 flex gap-2 items-center">
      <label for="search" class="sr-only">Search jobs</label>
      <input id="search" type="search" placeholder="Search jobs" class="border p-2 rounded flex-1" />
      <select id="limit" class="border p-2 rounded">
        <option value="5">5</option>
        <option value="10" selected>10</option>
        <option value="20">20</option>
      </select>
    </div>
    <div id="jobsList" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
    <div id="pagination" class="pagination"></div>
  </main>
  <script>
    window.USE_FIXTURES = false;
  </script>
  <script type="module">
    import { renderNavbar } from '/js/ui.js';
    import '/js/api.js';
    import { apiGet, apiPost } from '/js/api.js';
    renderNavbar('body');

    async function renderJobs(page = 1) {
      const list = document.getElementById('jobsList');
      list.innerHTML = 'Loading...';
      const searchVal = document.getElementById('search').value.trim();
      const limit = document.getElementById('limit').value;
      const q = `?search=${encodeURIComponent(searchVal)}&page=${page}&limit=${limit}`;
      const res = await apiGet('/jobs' + q);
      const jobs = res.data || [];
      const meta = res.meta || { total: jobs.length, page: 1, limit: jobs.length };
      if (!Array.isArray(jobs) || jobs.length === 0) { list.innerHTML = '<div class="empty-state card">No jobs found.</div>'; renderPagination(meta); return; }
      list.innerHTML = jobs.map(j => `
        <div tabindex="0" class="job-card card" role="article" aria-labelledby="job-${j._id}">
          <h3 id="job-${j._id}" class="font-semibold">${j.title}</h3>
          <p class="text-sm text-gray-600">${j.description || ''}</p>
          <p class="text-sm text-gray-500 mt-2">${j.companyId || ''} • ${j.location || ''}</p>
          <div class="mt-3 flex gap-2">
            <button data-id="${j._id}" class="applyBtn bg-blue-600 text-white px-3 py-1 rounded">Apply</button>
            <a href="/job-detail.html#${j._id}" class="text-sm text-gray-600">Details</a>
          </div>
        </div>
      `).join('');

      document.querySelectorAll('.applyBtn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const id = btn.getAttribute('data-id');
          const res = await apiPost('/jobs/apply', { jobId: id });
          alert(res.message || 'Applied');
        });
      });
      renderPagination(meta);
    }

    function renderPagination(meta) {
      const container = document.getElementById('pagination');
      container.innerHTML = '';
      const totalPages = Math.ceil(meta.total / meta.limit);
      if (totalPages <= 1) return;
      for (let p = 1; p <= totalPages; p++) {
        const btn = document.createElement('button');
        btn.className = 'page-btn';
        btn.textContent = p;
        btn.setAttribute('aria-label', `Page ${p}`);
        if (p === meta.page) btn.setAttribute('aria-current', 'true');
        btn.addEventListener('click', () => renderJobs(p));
        container.appendChild(btn);
      }
    }

    document.addEventListener('DOMContentLoaded', renderJobs);
  </script>
</body>
</html>
